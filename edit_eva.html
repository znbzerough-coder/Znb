<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modifier évaluation</title>
</head>
<body>
    <h1>Modifier évaluation</h1>

    <form method="POST">

        <!-- Stage dropdown: shows "Sujet — Nom Prenom" -->
        <label for="id_stage">Sujet:</label>
        <select id="id_stage" name="id_stage" required>
            {% for sujet in sujets %}
                <option value="{{ sujet[0] }}"
                    {% if sujet[0] == evaluation[1] %}selected{% endif %}>
                    {{ sujet[1] }} — {{ sujet[2] }} {{ sujet[3] }}
                </option>
            {% endfor %}
        </select>
        <br><br>

        <!-- Responsable dropdown: shows "Nom Prenom" -->
        <label for="id_responsable">Responsable:</label>
        <select id="id_responsable" name="id_responsable" required>
            {% for resp in responsables %}
                <option value="{{ resp[0] }}"
                    {% if resp[0] == evaluation[2] %}selected{% endif %}>
                    {{ resp[1] }} {{ resp[2] }}
                </option>
            {% endfor %}
        </select>
        <br><br>

        <label for="note_rapport">Note rapport:</label>
        <input type="number" id="note_rapport" name="note_rapport" min="0" max="20" value="{{ evaluation[3] }}">
        <br><br>

        <label for="note_soutenance">Note soutenance:</label>
        <input type="number" id="note_soutenance" name="note_soutenance" min="0" max="20" value="{{ evaluation[4] }}">
        <br><br>

        <label for="remarque">Remarque:</label>
        <input type="text" id="remarque" name="remarque" value="{{ evaluation[5] }}">
        <br><br>

        <label for="decision">Decision:</label>
        <input type="text" id="decision" name="decision" value="{{ evaluation[6] }}">
        <br><br>

        <button type="submit">Mettre à jour</button>
        <a href="/">Annuler</a>
    </form>
</body>
</html>
