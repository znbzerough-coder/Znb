<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un suivi</title>
</head>
<body>
    <h1>Ajouter un suivi</h1>
    <form action="" method="POST">

        <label for="type_suivi">Type de suivi:</label>
        <input type="text" id="type_suivi" name="type_suivi" required>
        <br><br>

        <label for="taux_d_avancement">Taux d'avancement:</label>
        <input type="text" id="taux_d_avancement" name="taux_d_avancement">
        <br><br>

        <label for="id_stage">Sujet du stage:</label>
        <select id="id_stage" name="id_stage" required>
            <option value="" disabled selected>-- Sélectionner un stage --</option>
            {% for stage in stages %}
                <option value="{{ stage[0] }}">{{ stage[1] }} — {{ stage[2] }} {{ stage[3] }}</option>
            {% endfor %}
        </select>
        <br><br>

        <label for="id_responsable">Responsable:</label>
        <select id="id_responsable" name="id_responsable" required>
            <option value="" disabled selected>-- Sélectionner un responsable --</option>
            {% for resp in responsables %}
                <option value="{{ resp[0] }}">{{ resp[1] }} {{ resp[2] }}</option>
            {% endfor %}
        </select>
        <br><br>

        <button type="submit">Ajouter</button>
        <a href="/suivis">Annuler</a>
    </form>
</body>
</html>
